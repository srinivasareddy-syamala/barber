<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Payment - Elite Cuts</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#000;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
}

.container{
  width:100%;
  max-width:1000px;
  display:grid;
  grid-template-columns:1fr 1fr;
  background:#111;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(201,162,39,0.2);
}

.left{
  padding:40px;
  border-right:1px solid rgba(201,162,39,0.2);
}

.logo{
  font-family:'Playfair Display',serif;
  font-size:24px;
  color:#c9a227;
  margin-bottom:20px;
}

.title{
  font-size:22px;
  margin-bottom:10px;
}

.amount{
  font-size:32px;
  font-weight:600;
  color:#c9a227;
  margin-bottom:20px;
}

.summary{
  background:#1a1a1a;
  padding:20px;
  border-radius:10px;
  margin-top:20px;
}

.summary div{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
  font-size:14px;
}

.right{
  padding:40px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.pay-btn{
  width:100%;
  padding:14px;
  background:#c9a227;
  border:none;
  border-radius:10px;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

.pay-btn:hover{
  background:#e0c85a;
}

.secure{
  text-align:center;
  font-size:12px;
  color:#888;
  margin-top:15px;
}
</style>

</head>

<body>

<div class="container">

  <!-- LEFT -->
  <div class="left">
    <div class="logo">✂ Elite Cuts</div>

    <div class="title">Appointment Payment</div>
    <div class="amount">AED 20</div>

    <div class="summary">
      <div><span>Service</span><span>Gentlemen Cut</span></div>
      <div><span>Barber</span><span>James Wilson</span></div>
      <div><span>Date</span><span>Oct 10</span></div>
      <div><span>Time</span><span>10:30 AM</span></div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">

    <button class="pay-btn" onclick="window.location.href='https://buy.stripe.com/cNi14g75W2vuaWp0wD9AA01'">
  Pay AED 20
</button>

    <div class="secure">
      🔒 Secure Payment powered by Stripe
    </div>

  </div>

</div>

<script>
async function payNow() {
  try {
    const response = await fetch("http://localhost:5678/webhook/create-payment", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        service: "Gentlemen Cut",
        barber: "James Wilson",
        date: "Oct 10",
        time: "10:30 AM",
        price: 1800
      })
    });

    const data = await response.json();

    if (data.url) {
      window.location.href = data.url;
    } else {
      alert("Payment session failed.");
    }

  } catch (error) {
    console.error(error);
    alert("Error connecting to payment server.");
  }
}
</script>

</body>
</html>
